<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro NES Emulator - Burger Time</title>
    
    <!-- FIX: This blank data link stops the browser from throwing the favicon 404 error -->
    <link rel="icon" href="data:,">

    <!-- Load the modern, official JSNES library distribution engine -->
    <script type="text/javascript" src="https://unpkg.com"></script>

    <style>
        body {
            background-color: #222;
            color: white;
            font-family: sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        #nes-container {
            margin: 20px auto;
            border: 4px solid #444;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            background: black;
            width: 512px;
            height: 480px;
        }
        #nes-container canvas {
            width: 100% !important;
            height: 100% !important;
        }
        .controls-info {
            margin-top: 15px;
            color: #aaa;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <h1>NES Emulator</h1>
    <p>Click inside the screen black box to focus your keys before playing!</p>

    <!-- The exact target container box where the script constructs the canvas screen -->
    <div id="nes-container"></div>

    <div class="controls-info">
        <p><strong>Built-in Keyboard Controls:</strong></p>
        <p>Arrow Keys = Move | X = A Button (Pepper) | Z = B Button | Enter = Start | Shift = Select</p>
    </div>

    <!-- Your external script executes right here at the very bottom -->
    <script src="rom-loader.js"></script>

</body>
</html>
