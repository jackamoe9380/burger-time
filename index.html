<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro NES Emulator - Burger Time</title>
    
    <!-- Load the stable emulator engine -->
    <script type="text/javascript" src="https://unpkg.com"></script>

    <style>
        body {
            background-color: #222;
            color: white;
            font-family: sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        #nes-canvas {
            border: 4px solid #444;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            background: black;
            max-width: 100%;
        }
        .controls-info {
            margin-top: 15px;
            color: #aaa;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <h1>NES Emulator</h1>
    <p>Click the screen below to focus controls before playing!</p>

    <!-- The game screen canvas -->
    <canvas id="nes-canvas" width="256" height="240" style="width: 512px; height: 480px;"></canvas>

    <div class="controls-info">
        <p><strong>Controls:</strong> Arrow Keys = Move | Z = Pepper (A) | X = B Button | Enter = Start | Shift = Select</p>
    </div>

    <!-- Loads your custom keyboard and ROM loader logic -->
    <script src="rom-loader.js"></script>

</body>
</html>
